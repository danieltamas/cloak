name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: cloak-macos-x86_64
            cargo_flags: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cloak-macos-aarch64
            cargo_flags: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: cloak-linux-x86_64
            cargo_flags: "--no-default-features"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: cloak-linux-aarch64
            cargo_flags: "--no-default-features"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: cloak-windows-x86_64.exe
            cargo_flags: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --locked
      - if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.cargo_flags }}
        working-directory: cli
      - if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.cargo_flags }}
        working-directory: cli
      - name: Rename binary to artifact name
        shell: bash
        run: |
          src="cli/target/${{ matrix.target }}/release/cloak"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.artifact }}"
      - if: runner.os == 'macOS'
        run: codesign -s - "${{ matrix.artifact }}"
      - uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: cd extension && npm ci --legacy-peer-deps && npm run build && npx vsce package --no-dependencies
      - uses: softprops/action-gh-release@v1
        with:
          files: extension/*.vsix
