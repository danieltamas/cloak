name: Release
on:
  push:
    tags: ['v*']
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: cloak-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cloak-macos-aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: cloak-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: cloak-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: cloak-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools libdbus-1-dev pkg-config
      - if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu libdbus-1-dev pkg-config
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
      - run: cargo build --release --target ${{ matrix.target }}
        working-directory: cli
      - name: Rename binary to artifact name
        shell: bash
        run: |
          src="cli/target/${{ matrix.target }}/release/cloak"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.artifact }}"
      - if: runner.os == 'macOS'
        run: codesign -s - "${{ matrix.artifact }}"
      - uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: cd extension && npm ci && npm run build && npx vsce package --no-dependencies
      - uses: softprops/action-gh-release@v1
        with:
          files: extension/*.vsix
